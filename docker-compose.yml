version: '3.8'

services:

  # ── Postgres + pgvector ──────────────────────────────────────────────────────
  db:
    image: ankane/pgvector:latest
    container_name: sherlock_db
    environment:
      POSTGRES_USER: sherlock
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sherlock_memory
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sherlock -d sherlock_memory"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sherlock_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://sherlock:password@db:5432/sherlock_memory
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── Next.js Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sherlock_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data: